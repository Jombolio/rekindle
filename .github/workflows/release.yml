name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-linux:
    name: Client — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Build
        working-directory: desktop
        run: flutter build linux --release --obfuscate --split-debug-info=symbols/

      - name: Copy desktop entry into bundle
        run: cp desktop/linux/rekindle.desktop desktop/build/linux/x64/release/bundle/data/

      - name: Package
        run: |
          cd desktop/build/linux/x64/release/bundle
          zip -r ../../../../../../RekindleClient-linux-x64.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: RekindleClient-linux-x64.zip

  release-windows:
    name: Client — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build
        working-directory: desktop
        run: flutter build windows --release --obfuscate --split-debug-info=symbols/

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" desktop\windows\installer.iss'

      - name: Package portable zip
        run: Compress-Archive -Path desktop/build/windows/x64/runner/Release/* -DestinationPath RekindleClient-windows-x64.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/windows/output/RekindleSetup.exe
            RekindleClient-windows-x64.zip

  release-android:
    name: Client — Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/rekindle.jks
          cat <<EOF > android/keystore.properties
          storeFile=rekindle.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk RekindleAndroid.apk

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: RekindleAndroid.apk

  release-server-linux:
    name: Server — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        working-directory: server
        run: dotnet publish Rekindle.Server/Rekindle.Server.csproj /p:PublishProfile=linux-x64

      - name: Package
        run: |
          cd server/Rekindle.Server/bin/publish/linux-x64
          zip -r ../../../../../RekindleServer-linux-x64.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: RekindleServer-linux-x64.zip

  release-server-windows:
    name: Server — Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        working-directory: server
        run: dotnet publish Rekindle.Server/Rekindle.Server.csproj /p:PublishProfile=win-x64

      - name: Package
        run: |
          cd server/Rekindle.Server/bin/publish/win-x64
          zip -r ../../../../../RekindleServer-windows-x64.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: RekindleServer-windows-x64.zip
