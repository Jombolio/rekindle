name: Build

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-linux:
    name: Client — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Build
        working-directory: client
        run: flutter build linux --release --obfuscate --split-debug-info=symbols/

      - name: Package
        run: |
          cp client/linux/rekindle.desktop client/build/linux/x64/release/bundle/data/
          cd client/build/linux/x64/release
          zip -r ../../../../../Rekindle-linux-x64.zip bundle/

      - uses: actions/upload-artifact@v4
        with:
          name: Rekindle-linux-x64
          path: Rekindle-linux-x64.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Rekindle-linux-x64.zip

  build-windows:
    name: Client — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build
        working-directory: client
        run: flutter build windows --release --obfuscate --split-debug-info=symbols/

      - name: Package
        run: |
          cd client/build/windows/x64/runner
          Compress-Archive -Path Release/* -DestinationPath ../../../../../Rekindle-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Rekindle-windows-x64
          path: Rekindle-windows-x64.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Rekindle-windows-x64.zip

  build-android:
    name: Client — Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/rekindle.jks
          cat <<EOF > android/keystore.properties
          storeFile=rekindle.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk Rekindle.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Rekindle-android
          path: Rekindle.apk

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Rekindle.apk

  build-server-linux:
    name: Server — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        working-directory: server
        run: |
          dotnet publish Rekindle.Server/Rekindle.Server.csproj \
            -c Release -r linux-x64 --self-contained \
            -o ../RekindleServer-linux

      - name: Package
        run: zip -r RekindleServer-linux-x64.zip RekindleServer-linux/

      - uses: actions/upload-artifact@v4
        with:
          name: RekindleServer-linux-x64
          path: RekindleServer-linux-x64.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: RekindleServer-linux-x64.zip

  build-server-windows:
    name: Server — Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        working-directory: server
        run: |
          dotnet publish Rekindle.Server/Rekindle.Server.csproj \
            -c Release -r win-x64 --self-contained \
            -o ../RekindleServer-windows

      - name: Package
        run: zip -r RekindleServer-windows-x64.zip RekindleServer-windows/

      - uses: actions/upload-artifact@v4
        with:
          name: RekindleServer-windows-x64
          path: RekindleServer-windows-x64.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: RekindleServer-windows-x64.zip
