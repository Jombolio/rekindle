name: Build

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Client — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Build
        working-directory: client
        run: flutter build linux --release --obfuscate --split-debug-info=symbols/

      - name: Copy desktop entry into bundle
        run: cp client/linux/rekindle.desktop client/build/linux/x64/release/bundle/data/

      - uses: actions/upload-artifact@v4
        with:
          name: Rekindle-linux-x64
          path: client/build/linux/x64/release/bundle/

      - name: Package for release
        if: github.event_name == 'release'
        run: |
          cd client/build/linux/x64/release/bundle
          zip -r ../../../../../../Rekindle-linux-x64.zip .

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Rekindle-linux-x64.zip

  build-windows:
    name: Client — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build
        working-directory: client
        run: flutter build windows --release --obfuscate --split-debug-info=symbols/

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" client\windows\installer.iss'

      - uses: actions/upload-artifact@v4
        with:
          name: RekindleSetup
          path: client/windows/output/RekindleSetup.exe

      - name: Package portable zip for release
        if: github.event_name == 'release'
        run: Compress-Archive -Path client/build/windows/x64/runner/Release/* -DestinationPath Rekindle-windows-x64.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/windows/output/RekindleSetup.exe
            Rekindle-windows-x64.zip

  build-android:
    name: Client — Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/rekindle.jks
          cat <<EOF > android/keystore.properties
          storeFile=rekindle.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: Rekindle-android
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk

  build-server-linux:
    name: Server — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        working-directory: server
        run: dotnet publish Rekindle.Server/Rekindle.Server.csproj /p:PublishProfile=linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: RekindleServer-linux-x64
          path: server/Rekindle.Server/bin/publish/linux-x64/

      - name: Package for release
        if: github.event_name == 'release'
        run: |
          cd server/Rekindle.Server/bin/publish/linux-x64
          zip -r ../../../../../RekindleServer-linux-x64.zip .

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: RekindleServer-linux-x64.zip

  build-server-windows:
    name: Server — Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        working-directory: server
        run: dotnet publish Rekindle.Server/Rekindle.Server.csproj /p:PublishProfile=win-x64

      - uses: actions/upload-artifact@v4
        with:
          name: RekindleServer-windows-x64
          path: server/Rekindle.Server/bin/publish/win-x64/

      - name: Package for release
        if: github.event_name == 'release'
        run: |
          cd server/Rekindle.Server/bin/publish/win-x64
          zip -r ../../../../../RekindleServer-windows-x64.zip .

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: RekindleServer-windows-x64.zip
