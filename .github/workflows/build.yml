name: Build

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Build
        working-directory: client
        run: flutter build linux --release --obfuscate --split-debug-info=symbols/

      - name: Package
        run: |
          cp client/linux/rekindle.desktop client/build/linux/x64/release/bundle/data/
          cd client/build/linux/x64/release
          zip -r ../../../../../Rekindle-linux-x64.zip bundle/

      - uses: actions/upload-artifact@v4
        with:
          name: Rekindle-linux-x64
          path: Rekindle-linux-x64.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Rekindle-linux-x64.zip

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build
        working-directory: client
        run: flutter build windows --release --obfuscate --split-debug-info=symbols/

      - name: Package
        run: |
          cd client/build/windows/x64/runner
          Compress-Archive -Path Release/* -DestinationPath ../../../../../Rekindle-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Rekindle-windows-x64
          path: Rekindle-windows-x64.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Rekindle-windows-x64.zip
